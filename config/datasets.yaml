# Dataset-Specific Configurations

datasets:
  sst2:
    name: "sst2"
    huggingface_id: "stanfordnlp/sst2"
    split: "validation"
    sample_size: 200
    labels: ["negative", "positive"]
    text_field: "sentence"
    label_field: "label"
    description: "Stanford Sentiment Treebank (binary classification)"
    task_type: "sentiment_analysis"
    curation:
      target: 200                     # curated set size (decoupled from sample_size)
      min_content_words: 5            # floor so dynamic_k / highlighting aren't degenerate
      max_chars: 400                  # ceiling
      oversample_factor: 1.5          # review pool ≈ target * factor (room for vetting drops)
      near_dup_jaccard: 0.9
      stratify_by: ["label", "length"]

  mnli:
    name: "mnli"
    huggingface_id: "nyu-mll/multi_nli"
    split: "validation_matched"
    sample_size: 200
    labels: ["entailment", "neutral", "contradiction"]
    text_field: "premise"
    secondary_text_field: "hypothesis"
    label_field: "label"
    description: "Multi-Genre Natural Language Inference"
    task_type: "natural_language_inference"
    curation:
      target: 200
      min_content_words: 3            # applies to the HYPOTHESIS for MNLI
      max_chars: 1500
      oversample_factor: 1.5
      near_dup_jaccard: 0.9
      stratify_by: ["label", "genre", "length"]

  ag_news:
    name: "ag_news"
    huggingface_id: "fancyzhx/ag_news"
    split: "test"
    sample_size: 200
    labels: ["World", "Sports", "Business", "Sci/Tech"]
    text_field: "text"
    label_field: "label"
    description: "AG News Topic Classification"
    task_type: "topic_classification"
    curation:
      target: 200
      min_content_words: 8
      max_chars: 2000
      oversample_factor: 1.5
      near_dup_jaccard: 0.9
      stratify_by: ["label", "length"]
